<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🐍 Snake</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-h:0;
  --bg:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}
body{
  background:var(--bg);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  display:flex;flex-direction:column;align-items:center;min-height:100dvh;
  overflow:hidden;-webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;touch-action:none;
  transition:background 2s ease;
}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:520px;padding:16px}
.screen.active{display:flex}

/* MENU */
#menu{justify-content:center;min-height:90dvh;gap:16px}
#menu h1{font-size:2.8rem;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.title-emoji{font-size:3.5rem;animation:titleBounce 2s ease-in-out infinite}
@keyframes titleBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
.subtitle{color:rgba(255,255,255,.85);font-size:1rem;margin-bottom:8px;font-weight:600}
.high-scores{
  background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border-radius:16px;
  padding:12px 18px;width:290px;margin-bottom:8px;color:#fff;
}
.high-scores h3{font-size:.85rem;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:6px}
.high-scores .hs-row{display:flex;justify-content:space-between;font-size:.95rem;font-weight:700;padding:2px 0}
.high-scores .hs-row .mode-label{opacity:.8}
.mode-btn{
  width:290px;padding:16px 24px;border:none;border-radius:16px;
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
  font-size:1.1rem;font-weight:800;color:#fff;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.15);transition:all .15s;
  display:flex;align-items:center;gap:12px;border:2px solid rgba(255,255,255,.2);
}
.mode-btn:active{transform:scale(.96)}
.mode-btn:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.4)}
.mode-btn .emoji{font-size:1.5rem}
.mode-btn.primary{
  background:linear-gradient(135deg,#f97316,#ef4444);
  border-color:transparent;box-shadow:0 6px 24px rgba(239,68,68,.4);
}
.settings-row{
  display:flex;gap:12px;width:290px;justify-content:center;margin-top:4px;
}
.icon-btn{
  width:48px;height:48px;border-radius:14px;border:2px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.15);font-size:1.3rem;cursor:pointer;color:#fff;
  backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.icon-btn:active{transform:scale(.9)}
.icon-btn.active{background:rgba(255,255,255,.35);border-color:#fff}

/* GAME */
#game{gap:4px;padding:8px 8px 16px}
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:520px;padding:0 4px;margin-bottom:2px;
}
.score-display{
  font-size:1.8rem;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);
  display:flex;align-items:baseline;gap:8px;
}
.combo-display{
  font-size:1rem;font-weight:800;color:#FFD700;opacity:0;transition:opacity .3s;
}
.combo-display.visible{opacity:1;animation:comboPop .3s cubic-bezier(.22,1.8,.5,1)}
@keyframes comboPop{0%{transform:scale(.5)}100%{transform:scale(1)}}
.hi-score{
  font-size:.85rem;font-weight:700;color:rgba(255,255,255,.5);transition:color .3s;
}
.hi-score.gold{color:#FFD700;animation:hiPulse 1s ease-in-out infinite}
@keyframes hiPulse{0%,100%{opacity:1}50%{opacity:.6}}
.top-icons{display:flex;gap:8px;align-items:center}
.top-icons button{
  background:rgba(255,255,255,.2);border:none;border-radius:10px;
  padding:6px 10px;font-size:1.1rem;cursor:pointer;color:#fff;
  backdrop-filter:blur(4px);
}
.speed-pips{
  display:flex;gap:3px;align-items:center;height:16px;
}
.speed-pips .pip{
  width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s;
}
.speed-pips .pip.lit{background:#FFD700;box-shadow:0 0 6px rgba(255,215,0,.6)}
.timer-display{
  font-size:1.4rem;font-weight:900;color:#FFD700;text-shadow:0 2px 8px rgba(0,0,0,.3);
  display:none;
}
.timer-display.visible{display:block}
.timer-display.urgent{color:#EF4444;animation:timerPulse .5s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* BOARD */
.board-wrap{
  position:relative;
  width:min(90vw,420px);height:min(90vw,420px);
}
canvas{
  width:100%;height:100%;border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,.35);
  image-rendering:pixelated;
}
.flash-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border-radius:16px;background:#fff;opacity:0;pointer-events:none;
  transition:opacity .1s;
}

/* DEATH OVERLAY */
.death-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border-radius:16px;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:20;
}
.death-overlay.active{display:flex}
.death-score{font-size:3rem;font-weight:900;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.death-new-best{
  font-size:1.3rem;font-weight:800;color:#FFD700;
  animation:bestBounce .6s cubic-bezier(.22,1.8,.5,1);
}
@keyframes bestBounce{0%{transform:scale(0) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}
.death-tap{font-size:1rem;color:rgba(255,255,255,.7);font-weight:600;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.death-stats{font-size:.85rem;color:rgba(255,255,255,.6);font-weight:600}

/* FLOAT TEXT */
.float-text{
  position:absolute;pointer-events:none;font-weight:900;font-size:1rem;
  color:#FFD700;text-shadow:0 1px 4px rgba(0,0,0,.5);z-index:15;
  animation:floatUp .8s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-40px) scale(1.3)}
}

/* PAUSE */
.pause-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border-radius:16px;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:25;
}
.pause-overlay.active{display:flex}
.pause-overlay h2{font-size:2rem;color:#fff;font-weight:900}
.pause-stats{color:rgba(255,255,255,.7);font-size:.9rem;font-weight:600;text-align:center;line-height:1.6}
.pause-btns{display:flex;gap:12px}
.pause-btn{
  padding:14px 28px;border:none;border-radius:14px;font-size:1.1rem;
  font-weight:800;cursor:pointer;color:#fff;transition:all .15s;
}
.pause-btn:active{transform:scale(.95)}
.pause-btn.resume{background:linear-gradient(135deg,#22C55E,#16A34A);box-shadow:0 4px 16px rgba(34,197,94,.4)}
.pause-btn.quit{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3)}

/* D-PAD */
.dpad{
  display:none;position:fixed;bottom:24px;right:24px;
  width:120px;height:120px;z-index:30;opacity:.4;
}
.dpad.visible{display:block}
.dpad button{
  position:absolute;width:40px;height:40px;border:none;border-radius:10px;
  background:rgba(255,255,255,.3);font-size:1.2rem;cursor:pointer;
  backdrop-filter:blur(4px);color:#fff;font-weight:900;
}
.dpad button:active{background:rgba(255,255,255,.5)}
.dpad .d-up{top:0;left:40px}
.dpad .d-down{bottom:0;left:40px}
.dpad .d-left{top:40px;left:0}
.dpad .d-right{top:40px;right:0}

/* CONFETTI */
.confetti-piece{
  position:fixed;width:8px;height:8px;z-index:100;pointer-events:none;
  animation:confettiFall 2s ease-in forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}
</style>
</head>
<body>

<!-- MENU SCREEN -->
<div id="menu" class="screen active">
  <div class="title-emoji">🐍</div>
  <h1>Snake</h1>
  <div class="subtitle">A modern classic</div>

  <div class="high-scores" id="hsDisplay"></div>

  <button class="mode-btn primary" onclick="startGame('classic')">
    <span class="emoji">🟢</span> Classic
  </button>
  <button class="mode-btn" onclick="startGame('walled')">
    <span class="emoji">🔴</span> Walled
  </button>
  <button class="mode-btn" onclick="startGame('speed')">
    <span class="emoji">⚡</span> Speed Run
  </button>
  <button class="mode-btn" onclick="startGame('zen')">
    <span class="emoji">🌀</span> Zen
  </button>

  <div class="settings-row">
    <button class="icon-btn" id="soundToggle" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" id="dpadToggle" onclick="toggleDpad()">🎮</button>
    <button class="icon-btn" id="gridToggle" onclick="toggleGrid()">⊞</button>
  </div>

  <a href="home.html" style="color:rgba(255,255,255,.6);font-size:.85rem;font-weight:600;text-decoration:none;margin-top:8px">← Back to Arcade</a>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
  <div class="top-bar">
    <div>
      <div class="score-display">
        <span id="scoreVal">0</span>
        <span class="combo-display" id="comboDisplay">×1</span>
      </div>
      <div class="speed-pips" id="speedPips"></div>
    </div>
    <div class="timer-display" id="timerDisplay">60</div>
    <div style="text-align:right">
      <div class="hi-score" id="hiScore">HI: 0</div>
      <div class="top-icons">
        <button id="pauseBtn" onclick="togglePause()">⏸</button>
        <button id="soundBtn" onclick="toggleSound()">🔊</button>
      </div>
    </div>
  </div>

  <div class="board-wrap" id="boardWrap">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="flash-overlay" id="flash"></div>
    <div class="death-overlay" id="deathOverlay">
      <div class="death-score" id="deathScore">0</div>
      <div class="death-new-best" id="deathBest" style="display:none">🏆 NEW BEST!</div>
      <div class="death-stats" id="deathStats"></div>
      <div class="death-tap">Tap to play again</div>
    </div>
    <div class="pause-overlay" id="pauseOverlay">
      <h2>⏸ Paused</h2>
      <div class="pause-stats" id="pauseStats"></div>
      <div class="pause-btns">
        <button class="pause-btn resume" onclick="togglePause()">Resume</button>
        <button class="pause-btn quit" onclick="quitToMenu()">Quit</button>
      </div>
    </div>
  </div>
</div>

<!-- D-PAD -->
<div class="dpad" id="dpad">
  <button class="d-up" ontouchstart="queueDir(0,-1);event.preventDefault()">▲</button>
  <button class="d-down" ontouchstart="queueDir(0,1);event.preventDefault()">▼</button>
  <button class="d-left" ontouchstart="queueDir(-1,0);event.preventDefault()">◀</button>
  <button class="d-right" ontouchstart="queueDir(1,0);event.preventDefault()">▶</button>
</div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const GRID = 20;
const CELL = 20; // canvas pixels per cell
const CANVAS_SIZE = GRID * CELL; // 400
const START_TICK = 150;
const MIN_TICK = 70;
const SPEED_STEP = 8;
const FOOD_PER_SPEED = 5;
const COMBO_WINDOW = 3000; // ms
const SPECIAL_INTERVAL = 30000; // ms
const SPECIAL_LIFETIME = 8000; // ms

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = null;
let settings = {
  sound: true,
  dpad: false,
  grid: false,
};
let audioCtx = null;

// ═══════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas');
canvas.width = CANVAS_SIZE;
canvas.height = CANVAS_SIZE;
const ctx = canvas.getContext('2d');

// ═══════════════════════════════════════════
// HIGH SCORES
// ═══════════════════════════════════════════
function getScores() {
  try { return JSON.parse(localStorage.getItem('snake_scores') || '{}'); } catch { return {}; }
}
function saveScore(mode, score) {
  const s = getScores();
  if (!s[mode]) s[mode] = [];
  s[mode].push(score);
  s[mode].sort((a, b) => b - a);
  s[mode] = s[mode].slice(0, 5);
  localStorage.setItem('snake_scores', JSON.stringify(s));
}
function getHiScore(mode) {
  const s = getScores();
  return (s[mode] && s[mode][0]) || 0;
}
function renderHiScores() {
  const s = getScores();
  const el = document.getElementById('hsDisplay');
  const modes = [['classic','🟢 Classic'],['walled','🔴 Walled'],['speed','⚡ Speed']];
  let html = '<h3>High Scores</h3>';
  let any = false;
  for (const [k, label] of modes) {
    const v = (s[k] && s[k][0]) || 0;
    if (v > 0) { html += `<div class="hs-row"><span class="mode-label">${label}</span><span>${v.toLocaleString()}</span></div>`; any = true; }
  }
  el.innerHTML = any ? html : '<h3>High Scores</h3><div style="opacity:.6;font-size:.85rem">No scores yet — play a round!</div>';
}

// ═══════════════════════════════════════════
// SOUND ENGINE (Web Audio API)
// ═══════════════════════════════════════════
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type = 'square', vol = 0.08) {
  if (!settings.sound) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur / 1000);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur / 1000);
}
function playNoise(dur, vol = 0.06) {
  if (!settings.sound) return;
  ensureAudio();
  const bufSize = audioCtx.sampleRate * dur / 1000;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur / 1000);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}
const SFX = {
  eat(combo) {
    const base = 523 + (combo - 1) * 60; // C5 + rise per combo
    playTone(base, 80, 'square', 0.07);
    setTimeout(() => playTone(base * 1.26, 60, 'square', 0.05), 30); // ~E5
  },
  specialAppear() {
    playTone(880, 100, 'sine', 0.05);
    setTimeout(() => playTone(1100, 100, 'sine', 0.05), 80);
  },
  eatSpecial() {
    playTone(523, 100, 'sine', 0.06);
    setTimeout(() => playTone(659, 100, 'sine', 0.06), 80);
    setTimeout(() => playTone(784, 150, 'sine', 0.06), 160);
  },
  speedUp() { playNoise(150, 0.04); },
  death() {
    playTone(220, 150, 'sawtooth', 0.08);
    setTimeout(() => playTone(150, 150, 'sawtooth', 0.06), 100);
    setTimeout(() => playNoise(200, 0.06), 200);
  },
  newBest() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 150, 'sine', 0.07), i * 120));
  }
};

// ═══════════════════════════════════════════
// HAPTICS
// ═══════════════════════════════════════════
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ═══════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════
function startGame(mode) {
  ensureAudio();
  const hi = getHiScore(mode);
  state = {
    mode,
    snake: [],
    dir: { x: 1, y: 0 },
    nextDir: { x: 1, y: 0 },
    inputQueue: [],
    food: null,
    specialFood: null,
    specialTimer: 0,
    specialSpawnTimer: 0,
    score: 0,
    foodEaten: 0,
    combo: 0,
    lastEatTime: 0,
    tickMs: mode === 'speed' ? 120 : START_TICK,
    speedLevel: 1,
    hiScore: hi,
    alive: true,
    paused: false,
    lastTick: 0,
    particles: [],
    floatTexts: [],
    deathParticles: [],
    effects: { doublePoints: 0, slow: 0, ghost: 0 },
    elapsed: 0,
    timeLeft: mode === 'speed' ? 60 : Infinity,
    shakeAmount: 0,
    bgHue: 0,
    goldenTrail: 0,
  };

  // init snake in center
  const cy = Math.floor(GRID / 2);
  const cx = Math.floor(GRID / 2) - 1;
  state.snake = [{ x: cx + 2, y: cy }, { x: cx + 1, y: cy }, { x: cx, y: cy }];
  spawnFood();
  state.specialSpawnTimer = performance.now() + SPECIAL_INTERVAL;

  showScreen('game');
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('hiScore').textContent = `HI: ${hi.toLocaleString()}`;
  document.getElementById('hiScore').classList.remove('gold');
  document.getElementById('deathOverlay').classList.remove('active');
  document.getElementById('pauseOverlay').classList.remove('active');
  document.getElementById('comboDisplay').classList.remove('visible');
  document.getElementById('timerDisplay').classList.remove('visible', 'urgent');
  if (mode === 'speed') document.getElementById('timerDisplay').classList.add('visible');
  if (settings.dpad) document.getElementById('dpad').classList.add('visible');
  else document.getElementById('dpad').classList.remove('visible');
  updateSpeedPips();
  updateBg();
  state.lastTick = performance.now();
  requestAnimationFrame(gameLoop);
}

function spawnFood() {
  const occupied = new Set(state.snake.map(s => `${s.x},${s.y}`));
  if (state.specialFood) occupied.add(`${state.specialFood.x},${state.specialFood.y}`);
  const free = [];
  for (let x = 0; x < GRID; x++)
    for (let y = 0; y < GRID; y++)
      if (!occupied.has(`${x},${y}`)) free.push({ x, y });
  if (free.length === 0) return;
  state.food = free[Math.floor(Math.random() * free.length)];
}

function spawnSpecialFood() {
  const types = [
    { type: 'star', color: '#FFD700', points: 50, effect: 'doublePoints', duration: 10000 },
    { type: 'lightning', color: '#3B82F6', points: 30, effect: 'slow', duration: 5000 },
    { type: 'diamond', color: '#A855F7', points: 75, effect: 'shrink', duration: 0 },
    { type: 'fire', color: '#EF4444', points: 40, effect: 'ghost', duration: 4000 },
  ];
  const occupied = new Set(state.snake.map(s => `${s.x},${s.y}`));
  if (state.food) occupied.add(`${state.food.x},${state.food.y}`);
  const free = [];
  for (let x = 0; x < GRID; x++)
    for (let y = 0; y < GRID; y++)
      if (!occupied.has(`${x},${y}`)) free.push({ x, y });
  if (free.length === 0) return;
  const pos = free[Math.floor(Math.random() * free.length)];
  const t = types[Math.floor(Math.random() * types.length)];
  state.specialFood = { ...pos, ...t, spawnTime: performance.now() };
  SFX.specialAppear();
}

function getSpeedLevel() {
  return Math.min(10, Math.floor((START_TICK - state.tickMs) / SPEED_STEP) + 1);
}

function tick() {
  if (!state || !state.alive || state.paused) return;

  // process input queue
  if (state.inputQueue.length > 0) {
    const next = state.inputQueue.shift();
    // validate: not opposite
    if (!(next.x === -state.dir.x && next.y === -state.dir.y)) {
      state.dir = next;
    }
  }

  const head = state.snake[0];
  let nx = head.x + state.dir.x;
  let ny = head.y + state.dir.y;

  // wall handling
  if (state.mode === 'walled') {
    if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) {
      die();
      return;
    }
  } else {
    // wrap
    nx = ((nx % GRID) + GRID) % GRID;
    ny = ((ny % GRID) + GRID) % GRID;
  }

  // self collision
  const isGhost = state.effects.ghost > performance.now();
  if (!isGhost) {
    for (let i = 0; i < state.snake.length - 1; i++) {
      if (state.snake[i].x === nx && state.snake[i].y === ny) {
        die();
        return;
      }
    }
  }

  const newHead = { x: nx, y: ny };
  state.snake.unshift(newHead);

  let ate = false;
  // check food
  if (state.food && nx === state.food.x && ny === state.food.y) {
    ate = true;
    state.foodEaten++;
    const now = performance.now();

    // combo
    if (now - state.lastEatTime < COMBO_WINDOW) {
      state.combo++;
    } else {
      state.combo = 1;
    }
    state.lastEatTime = now;

    // scoring
    const multiplier = state.effects.doublePoints > now ? 2 : 1;
    const points = 10 * state.speedLevel * state.combo * multiplier;
    state.score += points;

    // particles
    addEatParticles(state.food.x, state.food.y, '#EF4444');
    addFloatText(state.food.x, state.food.y, `+${points}`);

    // speed progression (not in zen or speed)
    if (state.mode !== 'zen' && state.mode !== 'speed') {
      if (state.foodEaten % FOOD_PER_SPEED === 0 && state.tickMs > MIN_TICK) {
        state.tickMs = Math.max(MIN_TICK, state.tickMs - SPEED_STEP);
        state.speedLevel = getSpeedLevel();
        SFX.speedUp();
        updateSpeedPips();
        updateBg();
      }
    }

    SFX.eat(state.combo);
    vibrate([10]);

    if (state.combo >= 3) vibrate([10, 30, 10]);

    spawnFood();
  } else {
    state.snake.pop();
  }

  // check special food
  if (state.specialFood && nx === state.specialFood.x && ny === state.specialFood.y) {
    const sf = state.specialFood;
    const now = performance.now();
    const multiplier = state.effects.doublePoints > now ? 2 : 1;
    const points = (sf.points + state.combo) * multiplier;
    state.score += points;

    addEatParticles(sf.x, sf.y, sf.color);
    addFloatText(sf.x, sf.y, `+${points}`);

    // apply effect
    if (sf.effect === 'doublePoints') state.effects.doublePoints = now + sf.duration;
    else if (sf.effect === 'slow') {
      state.effects.slow = now + sf.duration;
    }
    else if (sf.effect === 'ghost') state.effects.ghost = now + sf.duration;
    else if (sf.effect === 'shrink') {
      const removeCount = Math.min(3, state.snake.length - 3);
      for (let i = 0; i < removeCount; i++) state.snake.pop();
    }

    SFX.eatSpecial();
    vibrate([10, 30, 10]);
    state.specialFood = null;
  }

  // combo display
  const comboEl = document.getElementById('comboDisplay');
  if (state.combo > 1) {
    comboEl.textContent = `×${state.combo}`;
    comboEl.classList.add('visible');
  } else {
    comboEl.classList.remove('visible');
  }

  // golden trail at combo 5+
  if (state.combo >= 5) state.goldenTrail = performance.now() + 500;

  // update score display
  document.getElementById('scoreVal').textContent = state.score.toLocaleString();

  // hi score check
  const hiEl = document.getElementById('hiScore');
  if (state.mode !== 'zen' && state.score > state.hiScore) {
    hiEl.classList.add('gold');
    hiEl.textContent = `HI: ${state.score.toLocaleString()}`;
  }
}

function die() {
  state.alive = false;
  SFX.death();
  vibrate([100]);

  // screen flash
  const flash = document.getElementById('flash');
  flash.style.opacity = '0.3';
  setTimeout(() => flash.style.opacity = '0', 100);

  // shake
  state.shakeAmount = 8;

  // death particles from snake
  state.deathParticles = [];
  state.snake.forEach((seg, i) => {
    for (let p = 0; p < 3; p++) {
      state.deathParticles.push({
        x: seg.x * CELL + CELL / 2,
        y: seg.y * CELL + CELL / 2,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 1,
        color: i === 0 ? '#22C55E' : lerpColor('#22C55E', '#16A34A', i / state.snake.length),
        delay: i * 20,
      });
    }
  });

  const isNewBest = state.mode !== 'zen' && state.score > state.hiScore;
  if (isNewBest) {
    saveScore(state.mode, state.score);
    state.hiScore = state.score;
    SFX.newBest();
    spawnConfetti();
  } else if (state.mode !== 'zen') {
    saveScore(state.mode, state.score);
  }

  // show death overlay after delay
  setTimeout(() => {
    if (!state) return;
    const overlay = document.getElementById('deathOverlay');
    document.getElementById('deathScore').textContent = state.score.toLocaleString();
    document.getElementById('deathStats').textContent = `${state.foodEaten} food · ${state.mode} · best combo ×${state.combo}`;
    const bestEl = document.getElementById('deathBest');
    bestEl.style.display = isNewBest ? 'block' : 'none';
    overlay.classList.add('active');
  }, 800);
}

function addEatParticles(gx, gy, color) {
  const cx = gx * CELL + CELL / 2;
  const cy = gy * CELL + CELL / 2;
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.3;
    state.particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * (2 + Math.random() * 2),
      vy: Math.sin(angle) * (2 + Math.random() * 2),
      life: 1,
      color,
    });
  }
}

function addFloatText(gx, gy, text) {
  const wrap = document.getElementById('boardWrap');
  const scale = wrap.clientWidth / CANVAS_SIZE;
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = `${gx * CELL * scale + CELL * scale / 2}px`;
  el.style.top = `${gy * CELL * scale}px`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(now) {
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  // board background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, CANVAS_SIZE, CANVAS_SIZE, 0);
  ctx.fill();

  // grid lines
  if (settings.grid) {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, CANVAS_SIZE);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL); ctx.lineTo(CANVAS_SIZE, i * CELL);
      ctx.stroke();
    }
  }

  // walled mode border
  if (state && state.mode === 'walled') {
    ctx.strokeStyle = '#EF4444';
    ctx.lineWidth = 3;
    ctx.strokeRect(1.5, 1.5, CANVAS_SIZE - 3, CANVAS_SIZE - 3);
  }

  if (!state) return;

  // golden trail effect
  const isGolden = state.goldenTrail > now;

  // particle trail at high speed
  if (state.alive && state.tickMs < 100) {
    const head = state.snake[0];
    const alpha = 0.15;
    ctx.fillStyle = isGolden ? `rgba(255,215,0,${alpha})` : `rgba(34,197,94,${alpha})`;
    // draw fading trail on last few positions
    for (let i = 1; i < Math.min(4, state.snake.length); i++) {
      const s = state.snake[i];
      const a = alpha * (1 - i / 4);
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, 4);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // snake
  if (state.alive || state.deathParticles.length > 0) {
    const isGhost = state.effects.ghost > now;
    state.snake.forEach((seg, i) => {
      if (!state.alive && now - state.deathParticles[0]?.startTime > i * 20) return; // hide during death anim

      const t = i / Math.max(1, state.snake.length - 1);
      let color = isGolden ? lerpColor('#FFD700', '#FF8C00', t) : lerpColor('#22C55E', '#16A34A', t);
      if (isGhost) ctx.globalAlpha = 0.5;

      const x = seg.x * CELL;
      const y = seg.y * CELL;

      // glow for active effects
      if (i === 0) {
        if (state.effects.doublePoints > now) {
          ctx.shadowColor = '#FFD700';
          ctx.shadowBlur = 12;
        } else if (state.effects.ghost > now) {
          ctx.shadowColor = '#EF4444';
          ctx.shadowBlur = 12;
        } else if (state.effects.slow > now) {
          ctx.shadowColor = '#3B82F6';
          ctx.shadowBlur = 12;
        }
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x + 1, y + 1, CELL - 2, CELL - 2, i === 0 ? 6 : 4);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;

      // eyes on head
      if (i === 0) {
        const eyeR = 2.5;
        let ex1, ey1, ex2, ey2;
        if (state.dir.x === 1) { ex1 = x + CELL - 6; ey1 = y + 5; ex2 = x + CELL - 6; ey2 = y + CELL - 5; }
        else if (state.dir.x === -1) { ex1 = x + 6; ey1 = y + 5; ex2 = x + 6; ey2 = y + CELL - 5; }
        else if (state.dir.y === -1) { ex1 = x + 5; ey1 = y + 6; ex2 = x + CELL - 5; ey2 = y + 6; }
        else { ex1 = x + 5; ey1 = y + CELL - 6; ex2 = x + CELL - 5; ey2 = y + CELL - 6; }

        // white eye
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2); ctx.fill();
        // pupil
        ctx.fillStyle = '#000';
        const px = state.dir.x * 0.8, py = state.dir.y * 0.8;
        ctx.beginPath(); ctx.arc(ex1 + px, ey1 + py, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2 + px, ey2 + py, 1.2, 0, Math.PI * 2); ctx.fill();
      }
    });
  }

  // food
  if (state.food && state.alive) {
    const fx = state.food.x * CELL + CELL / 2;
    const fy = state.food.y * CELL + CELL / 2;
    const pulse = 1 + Math.sin(now / 500) * 0.08;
    const r = (CELL / 2 - 2) * pulse;

    ctx.fillStyle = '#EF4444';
    ctx.shadowColor = '#EF4444';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // shine dot
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(fx - r * 0.3, fy - r * 0.3, r * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }

  // special food
  if (state.specialFood && state.alive) {
    const sf = state.specialFood;
    const fx = sf.x * CELL + CELL / 2;
    const fy = sf.y * CELL + CELL / 2;
    const age = now - sf.spawnTime;
    const remaining = SPECIAL_LIFETIME - age;

    // blink when about to expire
    let visible = true;
    if (remaining < 2000) visible = Math.floor(now / 150) % 2 === 0;

    if (visible) {
      const pulse = 1 + Math.sin(now / 300) * 0.12;
      const r = (CELL / 2 - 1) * pulse;

      ctx.fillStyle = sf.color;
      ctx.shadowColor = sf.color;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(fx, fy, r, 0, Math.PI * 2);
      ctx.fill();

      // inner glow
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(fx, fy, r * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // symbol
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.floor(CELL * 0.5)}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const sym = { star: '⭐', lightning: '⚡', diamond: '💎', fire: '🔥' }[sf.type];
      ctx.fillText(sym, fx, fy + 1);
    }
  }

  // particles
  state.particles = state.particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.04;
    if (p.life <= 0) return false;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return true;
  });

  // death particles
  if (!state.alive) {
    state.deathParticles = state.deathParticles.filter(p => {
      if (!p.startTime) p.startTime = now;
      if (now - p.startTime < p.delay) return true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1; // gravity
      p.life -= 0.02;
      if (p.life <= 0) return false;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      return true;
    });
  }

  // shake
  if (state.shakeAmount > 0) {
    state.shakeAmount *= 0.9;
    if (state.shakeAmount < 0.5) state.shakeAmount = 0;
    const sx = (Math.random() - 0.5) * state.shakeAmount;
    const sy = (Math.random() - 0.5) * state.shakeAmount;
    canvas.style.transform = `translate(${sx}px, ${sy}px)`;
  } else {
    canvas.style.transform = '';
  }
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════
function gameLoop(now) {
  if (!state) return;

  if (state.alive && !state.paused) {
    // effective tick (slow effect)
    let effectiveTick = state.tickMs;
    if (state.effects.slow > now) effectiveTick = state.tickMs * 1.43; // 30% slower

    if (now - state.lastTick >= effectiveTick) {
      state.lastTick = now;
      tick();
    }

    // special food lifecycle
    if (state.specialFood) {
      if (now - state.specialFood.spawnTime > SPECIAL_LIFETIME) {
        state.specialFood = null;
      }
    }
    if (!state.specialFood && now > state.specialSpawnTimer) {
      spawnSpecialFood();
      state.specialSpawnTimer = now + SPECIAL_INTERVAL;
    }

    // speed run timer
    if (state.mode === 'speed') {
      const elapsed = (now - (state.gameStartTime || (state.gameStartTime = now))) / 1000;
      state.timeLeft = Math.max(0, 60 - elapsed);
      const timerEl = document.getElementById('timerDisplay');
      timerEl.textContent = Math.ceil(state.timeLeft).toString();
      if (state.timeLeft <= 10) timerEl.classList.add('urgent');
      if (state.timeLeft <= 0) {
        die();
      }
    }

    // combo decay check
    if (state.combo > 0 && now - state.lastEatTime > COMBO_WINDOW) {
      state.combo = 0;
      document.getElementById('comboDisplay').classList.remove('visible');
    }
  }

  render(now);
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
function queueDir(dx, dy) {
  if (!state || !state.alive || state.paused) return;
  const last = state.inputQueue.length > 0 ? state.inputQueue[state.inputQueue.length - 1] : state.dir;
  // prevent opposite
  if (dx === -last.x && dy === -last.y) return;
  // prevent same
  if (dx === last.x && dy === last.y) return;
  // max 1 queued
  if (state.inputQueue.length >= 1) state.inputQueue[0] = { x: dx, y: dy };
  else state.inputQueue.push({ x: dx, y: dy });
}

// keyboard
document.addEventListener('keydown', e => {
  if (!state) return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': queueDir(0, -1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': queueDir(0, 1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': queueDir(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': queueDir(1, 0); e.preventDefault(); break;
    case ' ': togglePause(); e.preventDefault(); break;
    case 'Enter':
      if (!state.alive) {
        startGame(state.mode);
        e.preventDefault();
      }
      break;
  }
});

// touch swipe
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
const boardWrap = document.getElementById('boardWrap');

document.addEventListener('touchstart', e => {
  // two-finger pause
  if (e.touches.length === 2 && state && state.alive) {
    togglePause();
    e.preventDefault();
    return;
  }
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = performance.now();
}, { passive: false });

document.addEventListener('touchend', e => {
  if (!state) return;

  // tap to restart
  if (!state.alive && document.getElementById('deathOverlay').classList.contains('active')) {
    startGame(state.mode);
    e.preventDefault();
    return;
  }

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const elapsed = performance.now() - touchStartTime;

  if (dist < 20 || elapsed > 200) return; // not a swipe

  if (Math.abs(dx) > Math.abs(dy)) {
    queueDir(dx > 0 ? 1 : -1, 0);
  } else {
    queueDir(0, dy > 0 ? 1 : -1);
  }
  e.preventDefault();
}, { passive: false });

// prevent scroll
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ═══════════════════════════════════════════
// PAUSE
// ═══════════════════════════════════════════
function togglePause() {
  if (!state || !state.alive) return;
  state.paused = !state.paused;
  document.getElementById('pauseOverlay').classList.toggle('active', state.paused);
  if (state.paused) {
    document.getElementById('pauseStats').innerHTML =
      `Score: ${state.score.toLocaleString()}<br>Food: ${state.foodEaten}<br>Speed: Level ${state.speedLevel}`;
  } else {
    state.lastTick = performance.now();
  }
}

function quitToMenu() {
  state = null;
  showScreen('menu');
  renderHiScores();
  document.getElementById('dpad').classList.remove('visible');
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function toggleSound() {
  settings.sound = !settings.sound;
  document.getElementById('soundToggle').classList.toggle('active', settings.sound);
  document.getElementById('soundToggle').textContent = settings.sound ? '🔊' : '🔇';
  const btn = document.getElementById('soundBtn');
  if (btn) btn.textContent = settings.sound ? '🔊' : '🔇';
  localStorage.setItem('snake_settings', JSON.stringify(settings));
}
function toggleDpad() {
  settings.dpad = !settings.dpad;
  document.getElementById('dpadToggle').classList.toggle('active', settings.dpad);
  document.getElementById('dpad').classList.toggle('visible', settings.dpad && state?.alive);
  localStorage.setItem('snake_settings', JSON.stringify(settings));
}
function toggleGrid() {
  settings.grid = !settings.grid;
  document.getElementById('gridToggle').classList.toggle('active', settings.grid);
  localStorage.setItem('snake_settings', JSON.stringify(settings));
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('snake_settings'));
    if (s) Object.assign(settings, s);
  } catch {}
  document.getElementById('soundToggle').classList.toggle('active', settings.sound);
  document.getElementById('soundToggle').textContent = settings.sound ? '🔊' : '🔇';
  document.getElementById('dpadToggle').classList.toggle('active', settings.dpad);
  document.getElementById('gridToggle').classList.toggle('active', settings.grid);
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateSpeedPips() {
  const el = document.getElementById('speedPips');
  let html = '';
  for (let i = 1; i <= 10; i++) {
    html += `<div class="pip${i <= (state?.speedLevel || 1) ? ' lit' : ''}"></div>`;
  }
  el.innerHTML = html;
}

function updateBg() {
  if (!state) return;
  // shift background warmer as speed increases
  const progress = (state.speedLevel - 1) / 9;
  const r1 = Math.round(102 + progress * 50);
  const g1 = Math.round(126 - progress * 40);
  const b1 = Math.round(234 - progress * 60);
  const r2 = Math.round(118 + progress * 40);
  const g2 = Math.round(75 - progress * 20);
  const b2 = Math.round(162 - progress * 30);
  document.body.style.background = `linear-gradient(135deg, rgb(${r1},${g1},${b1}) 0%, rgb(${r2},${g2},${b2}) 100%)`;
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
  const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
  const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r},${g},${b})`;
}

function spawnConfetti() {
  const colors = ['#FFD700', '#EF4444', '#22C55E', '#3B82F6', '#A855F7', '#F97316'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = `${Math.random() * 100}vw`;
    el.style.top = `${-10 - Math.random() * 20}px`;
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.width = `${6 + Math.random() * 6}px`;
    el.style.height = `${6 + Math.random() * 6}px`;
    el.style.animationDuration = `${1.5 + Math.random() * 1.5}s`;
    el.style.animationDelay = `${Math.random() * 0.5}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

// focus loss handling
let focusLostTime = 0;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    focusLostTime = performance.now();
  } else if (state && state.alive && !state.paused) {
    // pause after 2s away
    if (performance.now() - focusLostTime > 2000) {
      togglePause();
    } else {
      state.lastTick = performance.now();
    }
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadSettings();
renderHiScores();
</script>
</body>
</html>
